<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Dark navy background -->
  <circle cx="32" cy="32" r="32" fill="#0d1b2a"/>
  <!-- Ocean -->
  <circle cx="32" cy="32" r="28" fill="#1e3a5f"/>

  <!-- Latitude lines -->
  <ellipse cx="32" cy="32" rx="28" ry="7"   fill="none" stroke="#c9a050" stroke-width="0.7" opacity="0.45"/>
  <ellipse cx="32" cy="21" rx="22" ry="4.5" fill="none" stroke="#c9a050" stroke-width="0.7" opacity="0.3"/>
  <ellipse cx="32" cy="43" rx="22" ry="4.5" fill="none" stroke="#c9a050" stroke-width="0.7" opacity="0.3"/>
  <!-- Equator -->
  <line x1="4" y1="32" x2="60" y2="32" stroke="#c9a050" stroke-width="0.7" opacity="0.5"/>
  <!-- Longitude lines -->
  <ellipse cx="32" cy="32" rx="9"  ry="28" fill="none" stroke="#c9a050" stroke-width="0.7" opacity="0.3"/>
  <ellipse cx="32" cy="32" rx="20" ry="28" fill="none" stroke="#c9a050" stroke-width="0.7" opacity="0.2"/>

  <!-- Americas -->
  <path d="M19 13 Q16 19 17 28 Q15 36 18 44 Q21 50 23 46 Q25 40 23 34 Q27 28 25 21 Z"
        fill="#2a5c45" opacity="0.92"/>
  <!-- Europe / Africa -->
  <path d="M30 12 Q34 15 35 21 Q38 26 36 31 Q38 36 36 42 Q33 49 30 50 Q27 44 28 38 Q27 31 29 25 Q28 19 30 12 Z"
        fill="#2a5c45" opacity="0.88"/>
  <!-- Asia blob -->
  <path d="M38 13 Q47 15 51 22 Q53 29 49 33 Q44 37 40 34 Q37 29 38 22 Z"
        fill="#2a5c45" opacity="0.82"/>
  <!-- Australia -->
  <path d="M44 42 Q49 40 51 44 Q51 49 47 50 Q43 50 42 46 Z"
        fill="#2a5c45" opacity="0.82"/>

  <!-- Globe border -->
  <circle cx="32" cy="32" r="28" fill="none" stroke="#c9a050" stroke-width="1.8"/>
  <!-- Subtle highlight -->
  <circle cx="32" cy="32" r="32" fill="none" stroke="#c9a050" stroke-width="0.5" opacity="0.2"/>
</svg>
